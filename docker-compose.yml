services:
  postgres:
    image: postgres:16-alpine
    container_name: financiera_db
    restart: always
    environment:
      POSTGRES_USER: financiera_user
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: financiera_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financiera_user -d financiera_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: financiera_api
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
    environment:
      DATABASE_URL: postgresql+asyncpg://financiera_user:admin@postgres:5432/financiera_db
      SECRET_KEY: super_secret_jwt_key_financiera_prod_2026
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
