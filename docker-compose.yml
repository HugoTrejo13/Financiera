version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: financiera_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: financiera_user
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: financiera_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./backend
    container_name: financiera_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://financiera_user:admin@db:5432/financiera_db
      - SECRET_KEY=fall_back_secret
    depends_on:
      - db
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
